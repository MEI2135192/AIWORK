<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 AI Prompt 智能寶庫</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Sans TC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PapaParse for easy CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            blue: '#1877f2',
                            purple: '#8a2be2',
                            bg: '#f0f2f5'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 隱藏捲軸但保有滾動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 卡片內部 Prompt 滾動條美化 */
        .prompt-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .prompt-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .prompt-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .prompt-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-[#f0f4f9] font-sans min-h-screen text-slate-800 antialiased selection:bg-blue-100 selection:text-blue-900">

    <!-- Toast 複製成功提示 -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-10 opacity-0 pointer-events-none transition-all duration-300 ease-out bg-slate-950 text-white px-5 py-3 rounded-xl shadow-xl flex items-center space-x-3">
        <span class="flex h-6 w-6 items-center justify-center rounded-full bg-emerald-500 text-white">
            <i class="fa-solid fa-check text-xs"></i>
        </span>
        <span class="text-sm font-medium" id="toast-msg">已成功複製提示詞！</span>
    </div>

    <!-- 頂部區塊 -->
    <header class="max-w-7xl mx-auto pt-10 pb-6 px-4 text-center">
        <!-- 標題 -->
        <h1 class="text-3xl md:text-4xl font-extrabold flex items-center justify-center gap-3 text-slate-800 tracking-tight">
            <span>🚀</span> AI Prompt 智能寶庫
        </h1>
        
        <!-- Google Sheet 連結 -->
        <div class="mt-3">
            <a href="https://docs.google.com/spreadsheets/d/1ZTcW8JArW3BYGE3T6CDUvg9RHpb3qnjaZXIvgW3zkUE/edit?gid=1480282197#gid=1480282197" 
               target="_blank" 
               class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-blue-600 font-medium transition-colors duration-200">
                <i class="fa-regular fa-file-excel text-emerald-600 text-lg"></i>
                📂 開啟原始資料 Google Sheet
            </a>
        </div>

        <!-- 搜尋欄 -->
        <div class="max-w-xl mx-auto mt-6 relative px-2">
            <div class="absolute inset-y-0 left-5 flex items-center pointer-events-none text-slate-400">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <input type="text" 
                   id="search-input"
                   placeholder="搜尋提示詞..." 
                   class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-full shadow-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200 text-sm md:text-base">
        </div>

        <!-- 分類過濾標籤 (滾動條) -->
        <div class="mt-6 overflow-x-auto no-scrollbar py-2 px-2 max-w-5xl mx-auto">
            <div class="flex flex-nowrap md:flex-wrap justify-start md:justify-center gap-2" id="category-container">
                <!-- 分類按鈕將由 JavaScript 動態生成 -->
                <button class="px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-200 bg-blue-600 text-white shadow-sm">
                    全部
                </button>
            </div>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="max-w-7xl mx-auto px-4 pb-20">
        
        <!-- 區塊小標題 -->
        <div class="flex items-center gap-2 mb-6 mt-2 px-2">
            <span class="text-xl">🧠</span>
            <h2 class="text-xl font-bold text-slate-800">AI 協思</h2>
            <span class="text-xs text-slate-400 font-normal ml-2" id="data-status-badge">正在載入雲端資料...</span>
        </div>

        <!-- Google Sheet 設定提醒 (預設隱藏，僅在雲端載入失敗時顯示) -->
        <div id="gsheet-warning" class="hidden mb-6 mx-2 bg-amber-50 border border-amber-200 rounded-xl p-4 text-amber-800 text-sm">
            <div class="flex gap-3">
                <i class="fa-solid fa-circle-info text-amber-500 text-lg mt-0.5"></i>
                <div>
                    <h4 class="font-bold">提示：目前正在展示本地預設資料</h4>
                    <p class="mt-1">若要即時同步您的 Google Sheet 資料，請確保該試算表已開啟「共用」並選擇「<b>發布到網路</b>」：</p>
                    <ol class="list-decimal list-inside mt-2 space-y-1 text-xs text-amber-700">
                        <li>在 Google 試算表點選 <b>檔案</b> > <b>共用</b> > <b>發布到網路</b></li>
                        <li>選擇 <b>整個文件</b> 或該工作表，格式選擇 <b>網頁</b>，然後按下 <b>發布</b></li>
                        <li>重整此網頁即可完成實時同步！</li>
                    </ol>
                </div>
            </div>
        </div>

        <!-- 卡片網格 -->
        <div id="prompt-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 px-2">
            <!-- 卡片由 JavaScript 動態渲染 -->
            <!-- 骨架屏載入動畫 -->
            <div class="animate-pulse bg-white rounded-2xl h-80 shadow-sm border border-slate-100 p-5 flex flex-col justify-between">
                <div>
                    <div class="h-5 bg-slate-200 rounded w-1/4 mb-4"></div>
                    <div class="h-6 bg-slate-200 rounded w-3/4 mb-4"></div>
                    <div class="space-y-2">
                        <div class="h-4 bg-slate-200 rounded"></div>
                        <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                        <div class="h-4 bg-slate-200 rounded w-4/6"></div>
                    </div>
                </div>
                <div class="h-10 bg-slate-200 rounded-xl w-full"></div>
            </div>
            <!-- 重複骨架屏 -->
            <div class="animate-pulse bg-white rounded-2xl h-80 shadow-sm border border-slate-100 p-5 flex flex-col justify-between hidden sm:flex">
                <div>
                    <div class="h-5 bg-slate-200 rounded w-1/4 mb-4"></div>
                    <div class="h-6 bg-slate-200 rounded w-3/4 mb-4"></div>
                    <div class="space-y-2">
                        <div class="h-4 bg-slate-200 rounded"></div>
                        <div class="h-4 bg-slate-200 rounded w-5/6"></div>
                    </div>
                </div>
                <div class="h-10 bg-slate-200 rounded-xl w-full"></div>
            </div>
        </div>
    </main>

    <!-- 頁尾 -->
    <footer class="bg-white border-t border-slate-100 py-8 text-center text-xs md:text-sm text-slate-400 mt-auto">
        <p>© 2026 AI Prompt 智能寶庫. 專為高效思維打造.</p>
    </footer>

    <!-- JavaScript 邏輯 -->
    <script>
        // --- 設定與狀態管理 ---
        const SHEET_ID = '1ZTcW8JArW3BYGE3T6CDUvg9RHpb3qnjaZXIvgW3zkUE';
        const GID = '1480282197';
        
        // 1. 動態 CSV 連結 (使用 pub 格式以避免大部分 CORS 問題)
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?gid=${GID}&single=true&output=csv`;
        // 備用 Export 連結
        const EXPORT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

        // 2. 本地預設 Mock 資料 (與上傳圖片 100% 相同，確保在 Google Sheet 尚未發布前也能完美運作)
        const FALLBACK_DATA = [
            {
                "分類": "內容創作",
                "標題": "意義單詞",
                "提示詞": "將文章的重點部分，尋找一個代表性英文字母，並使這些字母的首字組合成一個具有意義的單詞（如「VISION」）」..."
            },
            {
                "分類": "內容創作",
                "標題": "品牌名稱",
                "提示詞": "完成 ChatGPT 角色定義後，依據「品牌定義」與「產品介紹」發想5個產品名稱與標題（口號）。\n\n- 提示詞指令：描述品牌與產品，請列出 數字 個產品名稱與行銷標題建議。(*「品牌定義」描述、「產品介紹」描述)\n- Prompt: 我推出一個運動鞋品牌，今年會銷售一款新型跑步鞋品牌，今年會銷售一款新型跑步..."
            },
            {
                "分類": "筆記精煉",
                "標題": "長編文章",
                "提示詞": "為這一篇長長文章，進行以下四個步驟，每一個步驟都要提供給文章與標示出來\n\n第1、請為這篇長文件生成一份簡短摘要。\n第2、請基於上一個摘要，不要遺漏任何專有名詞、數字或關鍵人物，重新生成一份摘要。\n第3、現在，請將摘要中每一句話都濃縮成更簡潔的表達，同時保留..."
            },
            {
                "分類": "筆記精煉",
                "標題": "書籍精煉",
                "提示詞": "請對 @[檔名]\n啟動【終極煉金管線】，一次執行四步驟整合：\n\n第一步：全域架構導航 (Stage 01)\n執行 stage-1-navigator，對精煉稿進行深度掃描，產出知識地圖與反直覺預警。\n存檔：01_Map_[主題簡稱].md。\n\n第二步：價值 DNA 診斷 (Stage 02)..."
            },
            {
                "分類": "筆記精煉",
                "標題": "書籍精煉",
                "提示詞": "請對選取章節，進行以下梳理：\n\n1- 核心觀點萃取：提煉出作者最想表達的3個核心思維。\n2- 邏輯地圖：以條列式還原論證邏輯。\n3- 關鍵概念定義：對生硬的名詞進行平民化通俗解釋。\n4- 行動指南：提煉出3個可立即付諸實踐的行動清單。"
            },
            {
                "分類": "筆記精煉",
                "標題": "提取練習",
                "提示詞": "我剛讀完了關於 [填入具體段落標題] 的內容。現在請幫我進行深度研磨：\n\n1-底層邏輯拷問：針對這段內容的「運作原理」向我提問，測試我是否理解了「為什麼有效」，而非只是記住步驟。\n2-環境轉化：如果這段概念有極端條件..."
            },
            {
                "分類": "內容創作",
                "標題": "影片清理",
                "提示詞": "你的角色是一位「逐字稿校對員」，不是編輯。\n\n任務：\n1-僅刪除口語填充詞、重複說法、明顯贅詞\n2-不得改寫句型、不得改變原意、不得加入新解釋\n\n規則：\n1-原句順序必須完全一致\n2-若刪除任何詞語，需確保前後..."
            },
            {
                "分類": "內容創作",
                "標題": "影片清理",
                "提示詞": "你的角色是一位「內容結構化整理員」，不是編輯、不是評論者。\n\n我會提供一段約 4000 字的影片文字內容，請你在完全保留原作者語意與立場的前提下，進行「保留語意的濃縮」，將內容壓縮至 約 2000 字。全文用繁體中文呈現。"
            }
        ];

        let allPrompts = [];
        let currentCategory = "全部";
        let searchQuery = "";

        // --- DOM Elements ---
        const promptGrid = document.getElementById('prompt-grid');
        const categoryContainer = document.getElementById('category-container');
        const searchInput = document.getElementById('search-input');
        const dataStatusBadge = document.getElementById('data-status-badge');
        const gsheetWarning = document.getElementById('gsheet-warning');

        // --- 初始化載入資料 ---
        window.onload = async function() {
            await loadData();
            setupEventListeners();
        };

        // 讀取資料邏輯
        async function loadData() {
            try {
                // 嘗試從雲端下載 CSV (使用 pub 網址優先)
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error("無法連接 Google Sheet 雲端發布 API");
                const csvText = await response.text();
                
                // 使用 PapaParse 解析 CSV
                const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
                
                if (parsed.data && parsed.data.length > 0) {
                    // 標準化欄位名稱對應 (部分 CSV 可能有不同欄位格式)
                    allPrompts = parsed.data.map(item => {
                        return {
                            "分類": item["分類"] || item["Category"] || item["category"] || "其他",
                            "標題": item["標題"] || item["標題/名稱"] || item["Title"] || item["title"] || "未命名 Prompt",
                            "提示詞": item["提示詞"] || item["內容"] || item["Prompt"] || item["prompt"] || ""
                        };
                    });
                    
                    dataStatusBadge.innerHTML = `<span class="text-emerald-600 font-semibold"><i class="fa-solid fa-cloud"></i> 雲端同步中</span>`;
                } else {
                    throw new Error("解析出的資料為空");
                }
            } catch (error) {
                console.warn("從 Google Sheet 載入資料失敗，使用本地預設 Mock 資料：", error);
                allPrompts = FALLBACK_DATA;
                dataStatusBadge.innerHTML = `<span class="text-amber-600 font-semibold"><i class="fa-solid fa-hard-drive"></i> 本地快取資料</span>`;
                gsheetWarning.classList.remove('hidden');
            }

            // 渲染介面
            renderCategories();
            renderPrompts();
        }

        // --- 渲染分類標籤 ---
        function renderCategories() {
            // 獲取所有不重複分類
            const categories = ["全部", ...new Set(allPrompts.map(item => item["分類"]))];
            
            categoryContainer.innerHTML = "";
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = getCategoryBtnClass(cat === currentCategory);
                btn.textContent = cat;
                btn.onclick = () => {
                    currentCategory = cat;
                    // 更新所有按鈕樣式
                    document.querySelectorAll('#category-container button').forEach(b => {
                        const isCurrent = b.textContent === currentCategory;
                        b.className = getCategoryBtnClass(isCurrent);
                    });
                    renderPrompts();
                };
                categoryContainer.appendChild(btn);
            });
        }

        // 獲取分類按鈕樣式
        function getCategoryBtnClass(isActive) {
            const baseClass = "px-4 py-1.5 rounded-full text-xs md:text-sm font-medium transition-all duration-200 whitespace-nowrap cursor-pointer ";
            if (isActive) {
                return baseClass + "bg-blue-600 text-white shadow-sm scale-105";
            } else {
                return baseClass + "bg-white text-slate-600 hover:bg-slate-100 border border-slate-200/60";
            }
        }

        // --- 渲染 Prompt 卡片 ---
        function renderPrompts() {
            promptGrid.innerHTML = "";

            // 過濾資料
            const filtered = allPrompts.filter(item => {
                const matchesCategory = currentCategory === "全部" || item["分類"] === currentCategory;
                const matchesSearch = searchQuery === "" || 
                    item["標題"].toLowerCase().includes(searchQuery.toLowerCase()) || 
                    item["分類"].toLowerCase().includes(searchQuery.toLowerCase()) || 
                    item["提示詞"].toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                promptGrid.innerHTML = `
                    <div class="col-span-full py-16 text-center text-slate-400">
                        <i class="fa-regular fa-folder-open text-4xl mb-3 block"></i>
                        <p>找不到符合條件的提示詞</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(item => {
                // 建立卡片元件
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm hover:shadow-md border border-slate-100 transition-all duration-300 flex flex-col justify-between overflow-hidden relative group";
                
                // 紫色漸層頂部裝飾條
                const accentBar = document.createElement('div');
                accentBar.className = "h-[5px] w-full bg-gradient-to-r from-purple-500 to-indigo-600";
                card.appendChild(accentBar);

                // 卡片主體
                const contentContainer = document.createElement('div');
                contentContainer.className = "p-5 flex-grow flex flex-col min-h-[220px]";

                // 標籤 + 標題
                const headerDiv = document.createElement('div');
                headerDiv.className = "mb-3";
                
                // 分類小藥丸 (高辨識度淡色系背景)
                const categoryPill = document.createElement('span');
                categoryPill.className = "inline-block px-2.5 py-0.5 rounded-full text-[10px] font-semibold text-blue-600 bg-blue-50 tracking-wider mb-1.5";
                categoryPill.textContent = item["分類"];
                headerDiv.appendChild(categoryPill);

                // 標題
                const title = document.createElement('h3');
                title.className = "text-lg font-bold text-slate-800 leading-tight";
                title.textContent = item["標題"];
                headerDiv.appendChild(title);
                
                contentContainer.appendChild(headerDiv);

                // Prompt 內文滾動區
                const textWrapper = document.createElement('div');
                textWrapper.className = "text-slate-600 text-xs md:text-sm whitespace-pre-line leading-relaxed overflow-y-auto max-h-36 pr-1 prompt-scroll flex-grow";
                textWrapper.textContent = item["提示詞"];
                contentContainer.appendChild(textWrapper);

                card.appendChild(contentContainer);

                // 複製按鈕 (點擊事件)
                const actionDiv = document.createElement('div');
                actionDiv.className = "p-4 pt-0";

                const copyBtn = document.createElement('button');
                copyBtn.className = "w-full py-2.5 px-4 bg-brand-blue hover:bg-blue-700 text-white font-medium text-xs md:text-sm rounded-xl transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer shadow-sm";
                copyBtn.innerHTML = `<i class="fa-regular fa-copy"></i> 複製 Prompt`;
                
                copyBtn.onclick = () => {
                    copyToClipboard(item["提示詞"]);
                    
                    // 變更按鈕樣式為成功狀態
                    copyBtn.className = "w-full py-2.5 px-4 bg-emerald-600 text-white font-medium text-xs md:text-sm rounded-xl transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer shadow-sm";
                    copyBtn.innerHTML = `<i class="fa-solid fa-check"></i> 已複製 !`;
                    
                    showToast("提示詞已成功複製到剪貼簿！");

                    setTimeout(() => {
                        copyBtn.className = "w-full py-2.5 px-4 bg-brand-blue hover:bg-blue-700 text-white font-medium text-xs md:text-sm rounded-xl transition-all duration-200 flex items-center justify-center gap-2 cursor-pointer shadow-sm";
                        copyBtn.innerHTML = `<i class="fa-regular fa-copy"></i> 複製 Prompt`;
                    }, 2000);
                };

                actionDiv.appendChild(copyBtn);
                card.appendChild(actionDiv);

                promptGrid.appendChild(card);
            });
        }

        // --- 事件監聽器設定 ---
        function setupEventListeners() {
            // 搜尋欄鍵入事件
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderPrompts();
            });
        }

        // --- 複製到剪貼簿功能 (兼容 iFrame 及各式環境) ---
        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            textarea.style.left = '-999999px';
            textarea.style.top = '-999999px';
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            
            try {
                document.execCommand('copy');
            } catch (err) {
                console.error('複製失敗:', err);
            }
            
            document.body.removeChild(textarea);
        }

        // --- 彈出通知提示 ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.textContent = message;
            
            toast.classList.remove('translate-y-10', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0', 'pointer-events-none');
            }, 2500);
        }
    </script>
</body>
</html>
