<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚀 AI Prompt 智能寶庫</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header>
    <h1>🚀 AI Prompt 智能寶庫</h1>
    <a
      class="sheet-link"
      href="https://docs.google.com/spreadsheets/d/1ZTcW8JArW3BYGE3T6CDUvg9RHpb3qnjaZXIvgW3zkUE/edit?gid=1480282197#gid=1480282197"
      target="_blank"
      rel="noopener"
    >📋 開啟原始資料 Google Sheet</a>
  </header>

  <!-- ══ SEARCH ══ -->
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="搜尋提示詞..." autocomplete="off" />
      <button id="clearBtn" class="clear-btn" aria-label="清除搜尋" style="display:none">✕</button>
    </div>
  </div>

  <!-- ══ FILTER TAGS ══ -->
  <nav class="filters" id="filters" aria-label="分類篩選"></nav>

  <!-- ══ STATS BAR ══ -->
  <div class="stats-bar" id="statsBar" style="display:none">
    顯示 <strong id="statsCount">0</strong> 筆
  </div>

  <!-- ══ MAIN CONTENT ══ -->
  <main id="mainContent">
    <div class="loading" id="loadingEl">
      <div class="spinner"></div>
      <p>連線 Google Sheet 中…</p>
    </div>
    <div id="sectionsEl"></div>
  </main>

  <!-- ══ TOAST ══ -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
